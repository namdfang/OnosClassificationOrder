filebeat.inputs:
  - type: log
    enabled: true

    paths:
      - /usr/share/filebeat/logs/*.log
    id: printsel-log

    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: log
    allow_older_versions: true 

output.elasticsearch:
  hosts: ['elasticsearch:${ELASTICSEARCH_PORT:9200}'] 
  username: '${ELASTIC_USERNAME:user-dev}'
  password: '${ELASTIC_PASSWORD:Aa@12345678}'

